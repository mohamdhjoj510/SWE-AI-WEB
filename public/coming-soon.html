<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon · LabTrend Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Inter', system-ui, sans-serif;
        color: #e8eefc;
        text-align: center;
        padding: 24px;
        background:
          radial-gradient(60% 50% at 20% 0%, rgba(34, 211, 238, 0.16), transparent 60%),
          radial-gradient(55% 45% at 90% 10%, rgba(168, 85, 247, 0.14), transparent 60%),
          radial-gradient(50% 50% at 50% 100%, rgba(99, 102, 241, 0.12), transparent 60%),
          #060912;
      }
      .badge {
        display: inline-block;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #22d3ee;
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        margin-bottom: 26px;
      }
      h1 {
        font-size: clamp(2.6rem, 9vw, 5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.05;
        background: linear-gradient(120deg, #22d3ee, #6366f1 60%, #a855f7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: #93a1c0;
        margin: 18px auto 34px;
        max-width: 440px;
        font-size: 1.05rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        font-weight: 600;
        color: #e8eefc;
        padding: 13px 24px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.05);
        transition: border-color 0.25s ease, background 0.25s ease, transform 0.18s ease;
      }
      a:hover {
        transform: translateY(-2px);
        border-color: #22d3ee;
        background: rgba(34, 211, 238, 0.08);
      }
      .pulse {
        margin: 0 auto 30px;
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(120deg, #22d3ee, #6366f1);
        box-shadow: 0 12px 32px -10px rgba(34, 211, 238, 0.7);
        animation: float 4s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="pulse">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#060912"
          stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h4l2-7 4 14 2-7h6" />
        </svg>
      </div>
      <span class="badge">LabTrend · Dashboard</span>
      <h1>Coming soon!</h1>
      <p>The interactive dashboard is still in development. Check back shortly.</p>
      <a href="/">← Back to project site</a>
    </main>
  </body>
</html>
